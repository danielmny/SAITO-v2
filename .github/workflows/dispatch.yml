name: founders-os-dispatch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Plan due runs
        run: python runner/orchestrate.py plan --instance-path .
      - name: Drain planned queue
        run: python runner/orchestrate.py drain-queue --instance-path .
