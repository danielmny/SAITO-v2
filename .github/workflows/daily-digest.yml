name: founders-os-daily-digest

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build MERIDIAN digest request
        run: python runner/orchestrate.py run-once --agent MERIDIAN-ORCHESTRATOR --trigger-type heartbeat --reason daily_digest --instance-path . --project startup_ops --task-type founder_digest
      - name: Drain digest queue
        run: python runner/orchestrate.py drain-queue --instance-path .
